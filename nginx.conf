server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # HTTP → HTTPS (Railway terminates SSL at edge and sets this header)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://www.klickkk.com$request_uri;
    }


    # Legal page routes
    location = /privacy-policy {
        return 302 /privacy-policy.html;
    }

    location = /terms-of-service {
        return 302 /terms-of-service.html;
    }

    # Backward compatibility with prototype paths
    location = /policies/privacy-policy {
        return 302 /privacy-policy.html;
    }

    location = /policies/terms-of-service {
        return 302 /terms-of-service.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
